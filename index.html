<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Loan Prediction System</h1>

    <form action="/predict" method="post">

        <label>Select Model:</label>
        <select name="model">
            <option value="RandomForest">Random Forest</option>
            <option value="Logistic">Logistic Regression</option>
        </select>

        <br><br>

        <!-- Example Inputs (Add More Features As Needed) -->
        <input type="text" name="AMT_INCOME_TOTAL" placeholder="Income" required>
        <input type="text" name="AMT_CREDIT" placeholder="Credit Amount" required>
        <input type="text" name="AMT_ANNUITY" placeholder="Annuity" required>
        <input type="text" name="employment_years" placeholder="Years Employed (e.g. 3.5)" required>


        <br><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}

</div>

</body>
</html>
